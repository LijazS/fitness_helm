apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fitness-route
  labels:
  {{- include "fitness-chart.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: sales-gateway
      namespace: sales-gateway-ns
  rules:
    - backendRefs:
        - name: fitness-tracker-active-service
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /